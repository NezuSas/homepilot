

services:
  homepilot-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: homepilot-api
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOMEPILOT_DB_PATH=/app/data/homepilot.db
      - HOMEPILOT_BACKUP_DIR=/app/backups
      - INTERNAL_HA_URL=http://homeassistant:8123
      - HOMEPILOT_DEV_BOOTSTRAP=${HOMEPILOT_DEV_BOOTSTRAP:-false}
      - CORS_ORIGIN=http://localhost,http://localhost:5173,http://127.0.0.1:5173
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      homeassistant:
        condition: service_healthy

  homepilot-ui:
    build:
      context: .
      dockerfile: docker/ui/Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: homepilot-ui
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - homepilot-api

  homeassistant:
    image: homeassistant/home-assistant:stable
    container_name: homeassistant
    volumes:
      - ./ha-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=UTC
    ports:
      - "18123:8123"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8123" ]
      interval: 60s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  data:
  ha-config:
